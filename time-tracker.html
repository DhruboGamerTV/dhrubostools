<!DOCTYPE html>
<html>
<head>
  <title>Time Since Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      margin: 0;
      padding: 0;
    }
    h1 {
      margin-top: 50px;
      font-size: 2.5em;
    }
    input {
      padding: 8px;
      margin: 10px;
      width: 250px;
    }
    button {
      background: #ff6f61;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 1.2em;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #ff3b2e;
    }
    #output {
      font-size: 1.5em;
      margin-top: 30px;
      background: rgba(255,255,255,0.7);
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
    }
    a.back {
      display: inline-block;
      margin-top: 40px;
      text-decoration: none;
      color: #333;
      background: white;
      padding: 10px 20px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Time Since Tracker</h1>
  <p>Enter a past date and time (YYYY-MM-DD HH:MM:SS):</p>
  <input type="text" id="dateInput" placeholder="2017-12-08 20:59:21">
  <button onclick="startTimer()">Start</button>
  <div id="output"></div>
  <br>
  <a class="back" href="index.html">⬅ Back to Menu</a>

  <script>
    let timer;
    function startTimer() {
      clearInterval(timer);
      const input = document.getElementById("dateInput").value.trim();
      if (!input) {
        document.getElementById("output").innerText = "Please enter a date and time.";
        return;
      }
      const formatted = input.replace(" ", "T");
      const pastDate = new Date(formatted);
      if (isNaN(pastDate)) {
        document.getElementById("output").innerText = "Invalid format. Use YYYY-MM-DD HH:MM:SS";
        return;
      }
      timer = setInterval(() => {
        const now = new Date();
        let diff = now - pastDate;
        const seconds = Math.floor(diff / 1000) % 60;
        const minutes = Math.floor(diff / (1000 * 60)) % 60;
        const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
        let years = now.getFullYear() - pastDate.getFullYear();
        let months = now.getMonth() - pastDate.getMonth();
        let days = now.getDate() - pastDate.getDate();
        if (days < 0) {
          months -= 1;
          const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
          days += prevMonth.getDate();
        }
        if (months < 0) {
          years -= 1;
          months += 12;
        }
        document.getElementById("output").innerText =
          `${years} years, ${months} months, ${days} days, ` +
          `${hours} hours, ${minutes} minutes, ${seconds} seconds since ${pastDate}`;
      }, 1000);
    }
  </script>
</body>
</html>
